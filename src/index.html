<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ffffff">
    <title>English Excellence</title>
    <script>
      let savedTheme = null;
      const preferredTheme = window.matchMedia('(prefers-color-scheme: dark)')
        .matches
        ? 'dark'
        : 'light';

      try {
        savedTheme = localStorage.getItem('theme');
      } catch {}

      document.documentElement.dataset.theme = savedTheme || preferredTheme;
    </script>
    <link
      rel="preload"
      href="./fonts/manrope-latin.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    >
    <link rel="stylesheet" href="./css/styles.css">
  </head>
  <body>
    <load src="./partials/header.html" />
    <load src="./partials/mobile-menu.html" />

    <main>
      <load src="./partials/hero.html" />
      <load src="./partials/about-us.html" />
      <load src="./partials/our-lessons.html" />
      <load src="./partials/proposal-to-leave-an-application.html" />
      <load src="./partials/our-teachers.html" />
      <load src="./partials/leave-an-application.html" />
      <load src="./partials/reviews.html" />
    </main>

    <load src="./partials/footer.html" />

    <script type="module" src="./main.js"></script>
  </body>
</html>
